<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" width="320" height="140">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1a16"/>
      <stop offset="100%" stop-color="#080b0a"/>
    </radialGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#46e2a0"/>
    </marker>
    <marker id="arrow-orig" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#52655d"/>
    </marker>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="140" fill="url(#bg)"/>

  <!-- Radar rings -->
  <circle cx="88" cy="70" r="28" fill="none" stroke="rgba(70,226,160,0.09)" stroke-width="1"/>
  <circle cx="88" cy="70" r="50" fill="none" stroke="rgba(70,226,160,0.06)" stroke-width="1"/>
  <circle cx="88" cy="70" r="72" fill="none" stroke="rgba(70,226,160,0.04)" stroke-width="1"/>

  <!-- Radar crosshairs -->
  <line x1="88" y1="5" x2="88" y2="135" stroke="rgba(70,226,160,0.06)" stroke-width="1"/>
  <line x1="8" y1="70" x2="168" y2="70" stroke="rgba(70,226,160,0.06)" stroke-width="1"/>

  <!-- Panel divider -->
  <line x1="186" y1="8" x2="186" y2="132" stroke="rgba(120,160,145,0.1)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Original (ghosted) heading label -->
  <text x="16" y="16" font-family="JetBrains Mono, monospace" font-size="7.5" fill="#52655d" letter-spacing="0.08em">ORIGINAL HDG</text>

  <!-- Ghost track: aircraft → straight into weather cell -->
  <line x1="72" y1="82" x2="200" y2="28" stroke="#52655d" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-orig)"/>

  <!-- Weather cell -->
  <ellipse cx="222" cy="24" rx="26" ry="14" fill="rgba(239,107,107,0.13)" stroke="rgba(239,107,107,0.45)" stroke-width="1" filter="url(#glow-red)"/>
  <text x="210" y="27" font-family="JetBrains Mono, monospace" font-size="7" fill="#ef6b6b">WX CELL</text>

  <!-- Aircraft at start position -->
  <circle cx="72" cy="84" r="4" fill="#46e2a0" filter="url(#glow-green)"/>
  <polygon points="72,84 78,78 74,84 78,90" fill="#46e2a0" opacity="0.9"/>

  <!-- New vectored path -->
  <line x1="72" y1="82" x2="156" y2="100" stroke="#46e2a0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="156" y1="100" x2="258" y2="44" stroke="#46e2a0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Vector label -->
  <text x="90" y="110" font-family="JetBrains Mono, monospace" font-size="7.5" fill="#46e2a0" opacity="0.85">VECTOR 140°</text>

  <!-- Right panel: ATC clearance -->
  <rect x="196" y="36" width="116" height="92" rx="3" fill="rgba(16,22,20,0.6)" stroke="rgba(91,200,214,0.2)" stroke-width="1"/>
  <text x="206" y="51" font-family="JetBrains Mono, monospace" font-size="7" fill="#5bc8d6" letter-spacing="0.08em">ATC CLEARANCE</text>
  <line x1="200" y1="56" x2="308" y2="56" stroke="rgba(91,200,214,0.2)" stroke-width="1"/>

  <text x="206" y="70" font-family="JetBrains Mono, monospace" font-size="7.5" fill="#b4c6bd">Fly heading</text>
  <text x="206" y="82" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#eafff5" font-weight="600">140°</text>

  <text x="206" y="98" font-family="JetBrains Mono, monospace" font-size="7.5" fill="#b4c6bd">Clear of WX/conflict</text>
  <text x="206" y="118" font-family="JetBrains Mono, monospace" font-size="7" fill="#52655d">Resume own nav</text>
</svg>
